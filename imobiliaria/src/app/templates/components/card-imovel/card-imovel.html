@let data = imovel();
@if (data) {
  <div class="detail-page">
    <div class="container">

      <div class="detail-grid">

        <!-- Imagem -->
        <div class="detail-left">
          <img [src]="data.imagemUrl" [alt]="data.titulo" class="detail-image"/>
        </div>

        <!-- Informações -->
        <div class="detail-right">

          <span class="detail-badge">{{ data.tipo }}</span>

          <h1 class="detail-title">{{ data.titulo }}</h1>

          <p class="detail-city">
            <span class="material-icons" style="font-size:1.1rem">location_on</span>
            {{ data.cidade }}
          </p>

          <p class="detail-price">{{ data.preco | currency:'BRL':'symbol':'1.0-0' }}</p>

          <div class="detail-divider"></div>

          <p class="detail-desc-label">Descrição</p>
          <p class="detail-desc">{{ data.descricao }}</p>

          <button class="btn-interest" (click)="registrarInteresse(data.id)">
            <span class="material-icons">favorite_border</span>
            Tenho interesse
          </button>

        </div>

      </div>

    </div>
  </div>
}
