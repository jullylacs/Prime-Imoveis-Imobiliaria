<div class="auth-page">
  <div class="auth-panel">

    <div class="auth-brand">
      <span class="material-icons brand-icon">apartment</span>
      <span class="brand-name">Prime <span>Imóveis</span></span>
    </div>

    <h2 class="auth-title">Crie sua conta</h2>
    <p class="auth-subtitle">Acesso gratuito a todos os imóveis</p>

    <form (ngSubmit)="onSubmit()" #form="ngForm">

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input id="nome" name="nome" type="text" placeholder="Seu nome" [(ngModel)]="nome" required/>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" placeholder="seu@email.com" [(ngModel)]="email" required/>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" placeholder="Mínimo 6 caracteres" [(ngModel)]="senha" required/>
      </div>

      @if (erro) {
        <div class="alert">
          <span class="material-icons" style="font-size:1rem">error_outline</span>
          {{ erro }}
        </div>
      }

      <button type="submit" class="btn-submit">Criar conta</button>

    </form>

    <p class="auth-footer-text">
      Já tem uma conta?
      <a routerLink="/login" class="auth-link">Entre aqui</a>
    </p>

  </div>
</div>
