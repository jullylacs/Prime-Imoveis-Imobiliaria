<div class="auth-page">
  <div class="auth-panel">

    <div class="auth-brand">
      <span class="material-icons brand-icon">apartment</span>
      <span class="brand-name">Prime <span>Imóveis</span></span>
    </div>

    <h2 class="auth-title">Bem-vindo de volta</h2>
    <p class="auth-subtitle">Entre na sua conta para continuar</p>

    <form (ngSubmit)="onSubmit()" #form="ngForm">

      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" placeholder="seu@email.com" [(ngModel)]="email" required/>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" placeholder="••••••••" [(ngModel)]="senha" required/>
      </div>

      @if (erro) {
        <div class="alert">
          <span class="material-icons" style="font-size:1rem">error_outline</span>
          {{ erro }}
        </div>
      }

      <button type="submit" class="btn-submit">Entrar</button>

    </form>

    <p class="auth-footer-text">
      Não tem uma conta?
      <a routerLink="/registrar" class="auth-link">Cadastre-se</a>
    </p>

  </div>
</div>
